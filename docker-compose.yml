version: '3.8'

services:
  greenapi-flask:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: greenapi-flask-app

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - .env

    networks:
      - greenapi-network

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  greenapi-network:
    driver: bridge
    name: greenapi-network
